name: freebsd-amd64-build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-freebsd-amd64:
    runs-on: ubuntu-latest
    env:
      APP_NAME: grok2api-rs
      PACKAGE_NAME: grok2api-rs-freebsd-amd64
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build binary in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.4"
          usesh: true
          envs: APP_NAME
          prepare: |
            pkg update
            pkg install -y cmake git llvm ninja perl5 rust
          run: |
            set -euo pipefail
            export LIBCLANG_PATH="$(llvm-config --libdir)"
            export CMAKE_GENERATOR=Ninja
            rustc --version
            cargo --version
            freebsd-version
            cargo build --locked --release

      - name: Prepare package
        run: |
          set -euo pipefail
          mkdir -p "dist/${PACKAGE_NAME}/data"
          install -m 755 "target/release/${APP_NAME}" "dist/${PACKAGE_NAME}/${APP_NAME}"
          install -m 644 config.defaults.toml "dist/${PACKAGE_NAME}/config.defaults.toml"
          install -m 644 data/token.json.example "dist/${PACKAGE_NAME}/data/token.json.example"
          install -m 644 README.md "dist/${PACKAGE_NAME}/README.md"

      - name: Create archive
        run: |
          set -euo pipefail
          tar -C dist -czf "dist/${PACKAGE_NAME}.tar.gz" "${PACKAGE_NAME}"
          sha256sum "dist/${PACKAGE_NAME}.tar.gz" > "dist/${PACKAGE_NAME}.tar.gz.sha256"

      - name: Validate artifacts
        run: |
          set -euo pipefail
          test -f "target/release/${APP_NAME}"
          file "target/release/${APP_NAME}" | tee /tmp/freebsd-file.txt
          grep -q "FreeBSD" /tmp/freebsd-file.txt
          tar -tzf "dist/${PACKAGE_NAME}.tar.gz" > /dev/null

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          if-no-files-found: error
          path: |
            dist/${{ env.PACKAGE_NAME }}.tar.gz
            dist/${{ env.PACKAGE_NAME }}.tar.gz.sha256
